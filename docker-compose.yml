services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: luma
      POSTGRES_PASSWORD: luma
      POSTGRES_DB: luma
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luma"]
      interval: 5s

volumes:
  pgdata:
